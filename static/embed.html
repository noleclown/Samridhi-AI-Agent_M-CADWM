<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samridhi AI – M-CADWM</title>
<!--
  embed.html — Samridhi AI full agent, iframe-embeddable
  ======================================================
  This page is identical to index.html but without the sidebar,
  optimised for embedding inside another website via <iframe>.

  Usage on mcad.one1sewa.com:
  ===========================

  Option A — Full dedicated page (button opens new tab):
    <a href="https://YOUR-SERVER/embed" target="_blank">
      Chat with Samridhi AI
    </a>

  Option B — Inline iframe embed on any page:
    <iframe
      src="https://YOUR-SERVER/embed"
      width="100%"
      height="700"
      style="border:none;border-radius:12px;"
      allow="microphone"
      title="Samridhi AI">
    </iframe>

  Option C — Modal popup (opens on button click):
    See script at bottom of this comment block.
    Add a button to the site:
      <button onclick="openSamridhiModal()">Chat with Samridhi AI</button>
    And the script below.
-->
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0E1117;
  --surface: #1A1D2E;
  --surface2:#12141F;
  --border:  rgba(255,255,255,0.08);
  --text:    #E8ECF4;
  --muted:   #8892A4;
  --accent:  #4A90D9;
  --green:   #4ade80;
  --amber:   #fbbf24;
  --radius:  12px;
  --font:    -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
html, body {
  height: 100%; background: var(--bg);
  color: var(--text); font-family: var(--font);
  font-size: 15px; line-height: 1.6;
  overflow: hidden;
}

/* ── Layout — single column, no sidebar ── */
.app {
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}

/* ── Header ── */
.chat-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.chat-header img {
  width: 28px; height: 28px;
  object-fit: contain; border-radius: 6px;
}
.header-info .title   { font-size: 15px; font-weight: 700; }
.header-info .sub     { font-size: 11px; color: var(--muted); }
.header-right {
  margin-left: auto; display: flex; gap: 6px; align-items: center;
}
.lang-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 10px;
  color: var(--muted); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.lang-btn.active {
  background: var(--accent); border-color: var(--accent); color: #fff;
}
.expand-link {
  color: var(--muted); font-size: 18px; text-decoration: none;
  padding: 2px 6px; border-radius: 4px;
  border: 1px solid var(--border);
  transition: all 0.15s; line-height: 1;
}
.expand-link:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

/* ── Messages ── */
.messages {
  flex: 1; overflow-y: auto;
  padding: 16px 20px;
  display: flex; flex-direction: column; gap: 10px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.message { display: flex; gap: 8px; }
.message.user { flex-direction: row-reverse; align-self: flex-end; max-width: 80%; }
.message.assistant { align-self: flex-start; width: 100%; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}
.message { animation: fadeUp 0.18s ease; }

.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0; margin-top: 2px;
}
.avatar.bot  { background: var(--accent); color: #fff; }
.avatar.usr  { background: #2d3a55; color: var(--text); }

.bubble {
  padding: 10px 14px; border-radius: var(--radius);
  font-size: 14px; line-height: 1.6;
}
.message.user .bubble {
  background: var(--accent); color: #fff;
  border-bottom-right-radius: 4px;
}
.message.assistant .bubble {
  background: var(--surface); border: 1px solid var(--border);
  border-bottom-left-radius: 4px; width: 100%;
}
.bubble p  { margin: 5px 0; }
.bubble ul,.bubble ol { padding-left: 18px; margin: 5px 0; }
.bubble li { margin: 2px 0; }
.bubble strong { font-weight: 700; }
.bubble h1,.bubble h2,.bubble h3 { font-weight: 700; margin: 8px 0 4px; }
.bubble h1 { font-size: 15px; }
.bubble h2 { font-size: 14px; }
.bubble h3 { font-size: 14px; color: #4A90D9; }
.bubble code { background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 4px; font-size: 13px; }
.bubble hr   { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

/* Badges */
.src-badge {
  display: inline-block; font-size: 11px; font-weight: 600;
  padding: 2px 9px; border-radius: 20px; margin-bottom: 6px;
}
.src-green { background: rgba(74,222,128,0.12); color: var(--green); }
.src-amber { background: rgba(251,191,36,0.12);  color: var(--amber); }
.src-grey  { background: rgba(148,163,184,0.10); color: var(--muted); }

/* Follow-ups */
.follow-ups { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
.follow-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.follow-btn {
  background: rgba(74,144,217,0.08); border: 1px solid rgba(74,144,217,0.2);
  border-radius: 7px; padding: 6px 10px; font-size: 13px; color: #93c5fd;
  cursor: pointer; text-align: left; transition: all 0.15s; line-height: 1.4;
}
.follow-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Actions */
.msg-actions { display: flex; gap: 6px; margin-top: 8px; align-items: center; }
.action-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 5px; padding: 2px 8px; font-size: 11px;
  color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.action-btn:hover { background: var(--accent); color: #fff; }
.thumb-btn {
  background: none; border: none; font-size: 13px;
  cursor: pointer; opacity: 0.4; transition: opacity 0.15s, transform 0.15s;
}
.thumb-btn:hover { opacity: 1; transform: scale(1.2); }
.thumb-btn.voted { opacity: 1; }

/* Typing */
.typing {
  display: flex; align-items: center; gap: 6px;
  padding: 12px 14px; background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius); border-bottom-left-radius: 4px;
  font-size: 12px; color: var(--muted);
}
.dots { display: flex; gap: 4px; }
.dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--muted); animation: bounce 1.2s infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); }
  40% { transform: translateY(-5px); }
}

/* ── Starters ── */
.starters {
  padding: 0 20px 12px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  flex-shrink: 0;
}
.starter-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; font-size: 12px;
  color: var(--text); cursor: pointer; text-align: left;
  line-height: 1.4; transition: all 0.15s;
}
.starter-btn:hover { border-color: var(--accent); background: rgba(74,144,217,0.08); }
.starters-label {
  grid-column: 1/-1; font-size: 11px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 0 2px;
}

/* ── Input ── */
.input-area {
  padding: 12px 20px; border-top: 1px solid var(--border);
  background: var(--surface2); flex-shrink: 0;
}
.input-row {
  display: flex; gap: 8px; align-items: flex-end;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 12px;
  transition: border-color 0.15s;
}
.input-row:focus-within { border-color: rgba(74,144,217,0.5); }
#chat-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 14px; font-family: var(--font);
  resize: none; min-height: 22px; max-height: 120px;
  line-height: 1.5; padding: 2px 0;
}
#chat-input::placeholder { color: var(--muted); }
.send-btn {
  background: var(--accent); border: none; border-radius: 8px;
  width: 32px; height: 32px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; flex-shrink: 0;
  transition: background 0.15s, opacity 0.15s;
}
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.send-btn:hover:not(:disabled) { background: #5BA3EC; }
.send-btn svg { fill: #fff; }
.input-footer {
  text-align: center; font-size: 10px; color: var(--muted); margin-top: 6px;
}

/* Mobile */
@media (max-width: 500px) {
  .starters { grid-template-columns: 1fr; }
  .messages { padding: 12px; }
  .input-area { padding: 10px 12px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="chat-header">
    <img src="/static/logo.png" alt="" onerror="this.style.display='none'">
    <div class="header-info">
      <div class="title">Samridhi AI</div>
      <div class="sub">AI Assistant — M-CADWM &amp; SMIS</div>
    </div>
    <div class="header-right">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn"        id="btn-hi" onclick="setLang('hi')">हि</button>
      <a class="expand-link" id="expand-link" href="/" target="_blank" title="Open in full page">⛶</a>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Starter questions (shown until first message) -->
  <div class="starters" id="starters" style="display:none;">
    <div class="starters-label">Common queries</div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="chat-input" rows="1"
        placeholder="Enter your query..."
        onkeydown="onKey(event)"
        oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24">
          <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      Samridhi AI &nbsp;·&nbsp; M-CADWM &amp; SMIS &nbsp;·&nbsp; Ministry of Jal Shakti, Government of India
    </div>
  </div>
</div>

<script>
const API   = window.location.origin;
let sessId  = null, lang = 'en', typing = false, msgN = 0;
const SUBST = ['faiss','live','fallback','cache'];

const STR = {
  en: {
    welcome: "Hello. I am Samridhi, the AI Assistant for the M-CADWM scheme and the SMIS portal.\n\nPlease state your query, or select a topic below.",
    placeholder: "Enter your query...",
    thinking: "Searching M-CADWM documents...",
    follow_label: "You may also ask:",
    badge_faiss: "✦ M-CADWM Official Documents",
    badge_live:  "◉ cadwm.gov.in (live)",
    badge_gen:   "◈ General Knowledge",
    badge_cache: "◇ Retrieved from cache",
  },
  hi: {
    welcome: "नमस्ते। मैं समृद्धि हूँ — M-CADWM योजना और SMIS पोर्टल के लिए AI सहायक।\n\nकृपया अपना प्रश्न दर्ज करें।",
    placeholder: "अपना प्रश्न दर्ज करें...",
    thinking: "M-CADWM दस्तावेज़ खोज रहे हैं...",
    follow_label: "आप यह भी पूछ सकते हैं:",
    badge_faiss: "✦ M-CADWM आधिकारिक दस्तावेज़",
    badge_live:  "◉ cadwm.gov.in (लाइव)",
    badge_gen:   "◈ सामान्य ज्ञान",
    badge_cache: "◇ कैश से प्राप्त",
  }
};
const s = () => STR[lang];

async function init() {
  await createSession();
  await loadStarters();
  addBot(s().welcome, '', []);
}

async function createSession() {
  try {
    const r = await fetch(`${API}/api/session?lang=${lang}`);
    const d = await r.json(); sessId = d.session_id;
    // Update expand link to continue same session in full page
    const el = document.getElementById('expand-link');
    if (el) el.href = `/?session_id=${sessId}&lang=${lang}`;
  } catch(e) { console.error(e); }
}

async function loadStarters() {
  try {
    const r = await fetch(`${API}/api/starters?lang=${lang}`);
    const d = await r.json();
    const box = document.getElementById('starters');
    // Keep label, add buttons
    const label = box.querySelector('.starters-label');
    box.innerHTML = '';
    box.appendChild(label);
    (d.starters || []).forEach(q => {
      const b = document.createElement('button');
      b.className = 'starter-btn'; b.textContent = q;
      b.onclick = () => submit(q); box.appendChild(b);
    });
    box.style.display = 'grid';
  } catch(e) {}
}

async function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.getElementById('btn-hi').classList.toggle('active', l==='hi');
  document.getElementById('chat-input').placeholder = s().placeholder;
  await createSession(); await loadStarters();
  document.getElementById('messages').innerHTML = ''; msgN = 0;
  addBot(s().welcome, '', []);
}

function onKey(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  document.getElementById('send-btn').disabled = !e.target.value.trim();
}

function sendMessage() {
  const inp = document.getElementById('chat-input');
  const q = inp.value.trim(); if (!q || typing) return;
  inp.value = ''; autoResize(inp);
  document.getElementById('send-btn').disabled = true;
  submit(q);
}

async function submit(question) {
  if (typing) return; typing = true;
  addUser(question);
  // Hide starters after first message
  document.getElementById('starters').style.display = 'none';
  const tid = addTyping();
  try {
    const r = await fetch(`${API}/api/chat`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({question, session_id: sessId, lang}),
    });
    removeEl(tid);
    if (!r.ok) throw new Error(r.status);
    const d = await r.json(); sessId = d.session_id;
    addBot(d.answer||'', d.layer||'', d.follow_ups||[]);
  } catch(e) {
    removeEl(tid);
    addBot('Sorry, something went wrong. Please try again.','','');
  } finally { typing = false; }
}

function addUser(text) {
  const id = ++msgN;
  const el = document.createElement('div');
  el.className = 'message user'; el.id = `m${id}`;
  el.innerHTML = `<div class="avatar usr">U</div><div class="bubble">${esc(text)}</div>`;
  msgs().appendChild(el); scroll(); return id;
}

function addBot(text, layer, fups) {
  const id = ++msgN;
  const clean = stripSrc(text);
  const isS   = SUBST.includes(layer);
  const el    = document.createElement('div');
  el.className = 'message assistant'; el.id = `m${id}`;
  el.innerHTML = `
    <div class="avatar bot">🤖</div>
    <div class="bubble">
      ${badge(layer)}
      <div class="bc">${md(clean)}</div>
      ${fupsHtml(fups, id)}
      ${isS ? actions(id) : ''}
    </div>`;
  msgs().appendChild(el);
  // Wire follow-up clicks
  el.querySelectorAll('.follow-btn').forEach(b => b.onclick = () => submit(b.dataset.q));
  el.querySelector('.copy-btn') && el.querySelector('.copy-btn').addEventListener('click', function() {
    navigator.clipboard.writeText(clean).then(() => { this.textContent='Copied!'; setTimeout(()=>this.textContent='Copy',2000); });
  });
  scroll(); return id;
}

function addTyping() {
  const id = ++msgN;
  const el = document.createElement('div');
  el.className = 'message assistant'; el.id = `m${id}`;
  el.innerHTML = `<div class="avatar bot">🤖</div>
    <div class="typing">${s().thinking}
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>`;
  msgs().appendChild(el); scroll(); return id;
}

function removeEl(id) { const e = document.getElementById(`m${id}`); if(e) e.remove(); }
function msgs()  { return document.getElementById('messages'); }
function scroll(){ const m=msgs(); requestAnimationFrame(()=>m.scrollTop=m.scrollHeight); }

function badge(layer) {
  const map = { faiss:['src-green',s().badge_faiss], live:['src-amber',s().badge_live], fallback:['src-grey',s().badge_gen], cache:['src-grey',s().badge_cache] };
  if (!map[layer]) return '';
  return `<span class="src-badge ${map[layer][0]}">${map[layer][1]}</span><br>`;
}
function fupsHtml(fups, id) {
  if (!fups || !fups.length) return '';
  const btns = (Array.isArray(fups)?fups:[]).map(q=>`<button class="follow-btn" data-q="${esc(q)}">${esc(q)}</button>`).join('');
  return `<div class="follow-ups"><div class="follow-label">${s().follow_label}</div>${btns}</div>`;
}
function actions(id) {
  return `<div class="msg-actions">
    <button class="action-btn copy-btn">Copy</button>
    <button class="thumb-btn" title="Helpful">👍</button>
    <button class="thumb-btn" title="Not helpful">👎</button>
  </div>`;
}
function stripSrc(t) {
  ['*Source: M-CADWM official documents*','*Source: cadwm.gov.in (live)*','*Note: Response based on general knowledge*',
   '*स्रोत: M-CADWM आधिकारिक दस्तावेज़*','*स्रोत: cadwm.gov.in (लाइव)*']
  .forEach(s => { const m = '\n\n---\n'+s; if(t.trimEnd().endsWith(s)) t=t.slice(0,t.trimEnd().length-s.length).trimEnd(); });
  return t;
}
function md(t) {
  if(!t) return '';
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>').replace(/^---$/gm,'<hr>')
    .replace(/^\s*[-•]\s+(.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/g,m=>`<ul>${m}</ul>`)
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>').replace(/^(.)/,'<p>$1').replace(/(.)$/,'$1</p>');
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function autoResize(el) {
  el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px';
  document.getElementById('send-btn').disabled=!el.value.trim();
}

init();
</script>
</body>
</html>
