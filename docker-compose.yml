version: "3.9"

services:
  samridhi:
    build: .
    container_name: samridhi-ai
    ports:
      - "8000:8000"
    environment:
      # Required — set your Groq API key here or in .env file
      - GROQ_API_KEY=${GROQ_API_KEY}
      # Comma-separated list of origins allowed to call the API
      # Add your website domain here
      - ALLOWED_ORIGINS=http://localhost:3000,https://cadwm.gov.in,https://www.cadwm.gov.in
    volumes:
      # Mount your FAISS index and model cache from the host
      # These are NOT built into the image — they stay on the host
      - ./faiss_index:/app/faiss_index:ro
      - ./models:/app/models:rw
      - ./documents:/app/documents:ro
      # Persistent DB files (feedback, web cache, expansions)
      - samridhi_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  samridhi_data:

# ── Usage ──────────────────────────────────────────────────────
# Local development:
#   docker compose up --build
#
# Background (production):
#   docker compose up -d --build
#
# View logs:
#   docker compose logs -f
#
# Stop:
#   docker compose down
